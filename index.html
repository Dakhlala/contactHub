<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script
      src="https://kit.fontawesome.com/0dfc26d656.js"
      crossorigin="anonymous"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"
    />
    <title>ContactHub</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white custom-navbar py-3">
      <div class="container-fluid container-xl">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <div
            class="logo d-flex align-items-center justify-content-center me-3 rounded-4"
          >
            <i class="fa-solid fa-address-book text-white"></i>
          </div>
          <div class="brand-text">
            <h1 class="m-0 fw-bold fs-24">
              Contact<span class="purple-clr">Hub</span>
            </h1>
            <p class="text-secondary m-0 fs-13 fw-500 left-nav-text">
              Smart Contact Manager
            </p>
          </div>
        </a>

        <div class="d-flex gap-4 align-items-center ms-auto">
          <button
            type="button"
            class="btn bg-purple btn-add text-light fw-500 fs-14 px-3 py-2 rounded-3 d-flex align-items-center gap-1"
            data-bs-toggle="modal"
            data-bs-target="#addContactModal"
            onclick="openAddModal()"
          >
            <span>+ Add</span><span class="right-btn-text">Contact</span>
          </button>

          <a class="nav-link p-0 right-link" href="#" aria-label="Recent">
            <i class="fa-solid fa-bell text-secondary fs-18"></i>
          </a>
          <a class="nav-link p-0 right-link" href="#" aria-label="Settings">
            <i class="fa-solid fa-gear text-secondary fs-18"></i>
          </a>
          <div class="d-flex align-items-center">
            <img
              src="images/avatar-2.jpg"
              alt="User profile"
              class="navImg rounded-4 object-fit-cover"
            />
          </div>
        </div>
      </div>
    </nav>
    <div
      class="modal fade modalBackdrop"
      id="addContactModal"
      tabindex="-1"
      aria-labelledby="addContactModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered custom-modal-width">
        <div class="modal-content border-0 rounded-4 px-2 py-1">
          <div
            class="modal-header border-0 pb-0 pt-4 px-4 d-flex align-items-center justify-content-between"
          >
            <h5
              class="modal-title fs-18 fw-bold text-dark"
              id="addContactModalLabel"
            >
              Add New Contact
            </h5>
            <button
              type="button"
              class="btn-close fs-12 text-secondary custom-close-btn shadow-none"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body px-4 pt-3 pb-2">
            <form id="addContactForm">
              <input type="hidden" id="editContactId" value="" />

              <div
                class="d-flex flex-column align-items-center justify-content-center mb-4"
              >
                <div
                  class="modal-avatar-bg rounded-circle d-flex align-items-center justify-content-center mb-2"
                >
                  <i class="fa-solid fa-user text-white fs-32"></i>
                </div>
                <button
                  type="button"
                  class="btn btn-light btn-change-photo fs-12 fw-500 text-dark border px-3 py-1.5 rounded-3 d-flex align-items-center gap-2 shadow-sm"
                >
                  <i class="fa-solid fa-camera text-secondary fs-13"></i> Change
                  Photo
                </button>
              </div>

              <div class="d-flex flex-column gap-3 mb-4">
                <div>
                  <label class="form-label fs-13 fw-500 text-dark mb-1"
                    >Full Name <span class="text-danger">*</span></label
                  >
                  <input
                    type="text"
                    class="form-control modal-input fs-14 py-2.5 px-3 rounded-3"
                    id="nameInput"
                    placeholder="Enter full name"
                    oninput="validateNameInput()"
                    required
                  />
                  <div class="error-text fs-12 mt-1" id="nameError"></div>
                </div>

                <div>
                  <label class="form-label fs-13 fw-500 text-dark mb-1"
                    >Phone Number <span class="text-danger">*</span></label
                  >
                  <input
                    type="tel"
                    class="form-control modal-input fs-14 py-2.5 px-3 rounded-3"
                    id="phoneInput"
                    placeholder="e.g., 01012345678"
                    oninput="validatePhoneInput()"
                    required
                  />
                  <div class="error-text fs-12 mt-1" id="phoneError"></div>
                </div>

                <div>
                  <label class="form-label fs-13 fw-500 text-dark mb-1"
                    >Email Address</label
                  >
                  <input
                    type="email"
                    class="form-control modal-input fs-14 py-2.5 px-3 rounded-3"
                    id="emailInput"
                    placeholder="name@example.com"
                    oninput="validateEmailInput()"
                  />
                  <div class="error-text fs-12 mt-1" id="emailError"></div>
                </div>

                <div>
                  <label class="form-label fs-13 fw-500 text-dark mb-1"
                    >Address</label
                  >
                  <input
                    type="text"
                    class="form-control modal-input fs-14 py-2.5 px-3 rounded-3"
                    id="addressInput"
                    placeholder="Enter address"
                  />
                </div>

                <div>
                  <label class="form-label fs-13 fw-500 text-dark mb-1"
                    >Group</label
                  >
                  <select
                    class="form-select form-selector modal-input fs-14 py-2.5 px-3 rounded-3 text-secondary shadow-none"
                    id="groupInput"
                  >
                    <option selected disabled>Select a group</option>
                    <option value="family">Family</option>
                    <option value="friends">Friends</option>
                    <option value="work">Work</option>
                    <option value="school">School</option>
                    <option value="other">Other</option>
                  </select>
                </div>

                <div>
                  <label class="form-label fs-13 fw-500 text-dark mb-1"
                    >Notes</label
                  >
                  <textarea
                    class="form-control modal-input fs-14 py-2.5 px-3 rounded-3 notes-textarea"
                    id="notesInput"
                    placeholder="Add notes about this contact"
                    rows="3"
                  ></textarea>
                </div>
              </div>

              <div class="d-flex gap-4 align-items-center pt-1 mb-2">
                <div class="form-check d-flex align-items-center">
                  <input
                    class="form-check-input modal-checkbox me-2"
                    type="checkbox"
                    id="favoriteCheck"
                  />
                  <label
                    class="form-check-label fs-13 fw-500 text-secondary mt-0.5 d-flex align-items-center gap-1"
                    for="favoriteCheck"
                  >
                    <i class="fa-solid fa-star text-warning fs-13"></i> Favorite
                  </label>
                </div>
                <div class="form-check d-flex align-items-center">
                  <input
                    class="form-check-input modal-checkbox me-2"
                    type="checkbox"
                    id="emergencyCheck"
                  />
                  <label
                    class="form-check-label fs-13 fw-500 text-secondary mt-0.5 d-flex align-items-center gap-1"
                    for="emergencyCheck"
                  >
                    <i class="fa-solid fa-heart-pulse text-danger fs-13"></i>
                    Emergency
                  </label>
                </div>
              </div>
            </form>
          </div>

          <div
            class="modal-footer border-0 pt-3 pb-4 px-4 d-flex gap-3 justify-content-between align-items-center w-100"
          >
            <button
              type="button"
              class="btn btn-modal-cancel fs-14 fw-500 text-secondary rounded-3 border-0 flex-grow-1 py-2.5"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              id="saveContactBtn"
              class="btn btn-modal-save bg-purple text-white fs-14 fw-500 rounded-3 border-0 flex-grow-1 py-2.5 d-flex align-items-center justify-content-center gap-1"
              onclick="saveContact()"
            >
              <i class="fa-solid fa-check fs-13"></i>
              <span id="saveContactBtnText">Save Contact</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/index.js"></script>
  </body>
</html>
